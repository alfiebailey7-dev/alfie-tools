
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:600px}
.panel{padding:1.5rem}
.left{border-right:0.5px solid var(--color-border-tertiary)}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin:1.25rem 0 .5rem}
.section-label:first-child{margin-top:0}
.field{margin-bottom:.6rem}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px}
.field input,.field textarea{width:100%;padding:6px 10px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans)}
.field textarea{resize:vertical;min-height:52px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-gen{width:100%;margin-top:1rem;padding:10px;font-size:13px;font-weight:500;background:#1a56db;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer}
.btn-gen:hover{background:#1648c0}
.btn-gen:disabled{background:#555;cursor:default}
.right{display:flex;flex-direction:column;gap:0}
.output-header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 1.5rem .75rem}
.output-title{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.btn-copy{padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-copy:hover{background:var(--color-background-secondary)}
.output-body{flex:1;padding:0 1.5rem 1.5rem;overflow-y:auto;font-size:13px;line-height:1.75;color:var(--color-text-primary)}
.output-body h3{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4a9eff;margin:1.25rem 0 .4rem}
.output-body h3:first-child{margin-top:0}
.output-body p{margin-bottom:.5rem;color:var(--color-text-primary)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;gap:.5rem;color:var(--color-text-tertiary);text-align:center}
.empty-state .icon{font-size:32px;opacity:.35}
.empty-state p{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;height:100%;min-height:400px;gap:.5rem;color:var(--color-text-secondary);font-size:13px}
.dot{width:5px;height:5px;border-radius:50%;background:#4a9eff;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:.25rem 0}
</style>

<h2 class="sr-only">Investor update generator — fill in the metrics and generate a professional narrative</h2>

<div class="wrap">
  <div class="panel left">
    <div class="section-label">Assets under advice</div>
    <div class="row2">
      <div class="field"><label>AUA this month (£)</label><input id="aua_now" type="text" placeholder="e.g. 4,200,000"></div>
      <div class="field"><label>AUA last month (£)</label><input id="aua_prev" type="text" placeholder="e.g. 3,800,000"></div>
    </div>

    <div class="section-label">Customers</div>
    <div class="row2">
      <div class="field"><label>New customers</label><input id="cust_new" type="number" placeholder="e.g. 12"></div>
      <div class="field"><label>Churned customers</label><input id="cust_churn" type="number" placeholder="e.g. 2"></div>
    </div>
    <div class="field"><label>Total customers</label><input id="cust_total" type="number" placeholder="e.g. 148"></div>

    <div class="section-label">Financials</div>
    <div class="row2">
      <div class="field"><label>Revenue run rate (£/yr)</label><input id="rev" type="text" placeholder="e.g. 480,000"></div>
      <div class="field"><label>Monthly burn rate (£)</label><input id="burn" type="text" placeholder="e.g. 65,000"></div>
    </div>

    <div class="section-label">Team</div>
    <div class="row2">
      <div class="field"><label>New hires this month</label><input id="hires" type="number" placeholder="e.g. 2"></div>
      <div class="field"><label>Total headcount</label><input id="headcount" type="number" placeholder="e.g. 11"></div>
    </div>

    <div class="section-label">Narrative context</div>
    <div class="field"><label>Key highlight this month</label><textarea id="highlight" placeholder="e.g. Signed first enterprise client, a £250k AUA account from a referral."></textarea></div>
    <div class="field"><label>Biggest challenge this month</label><textarea id="challenge" placeholder="e.g. Longer-than-expected onboarding times are delaying revenue recognition."></textarea></div>
    <div class="field"><label>Priority next month</label><textarea id="priority" placeholder="e.g. Launch our automated fact-find flow and hire a senior advisor."></textarea></div>

    <button class="btn-gen" id="genBtn" onclick="generate()">Generate investor update</button>
  </div>

  <div class="panel right" style="padding:0">
    <div class="output-header">
      <span class="output-title">Generated update</span>
      <button class="btn-copy" id="copyBtn" onclick="copyText()" style="display:none">
        <i class="ti ti-copy" aria-hidden="true"></i> Copy
      </button>
    </div>
    <div class="divider" style="margin:0 1.5rem"></div>
    <div class="output-body" id="output">
      <div class="empty-state">
        <i class="ti ti-file-description icon" aria-hidden="true"></i>
        <p>Fill in the fields and hit<br>Generate investor update</p>
      </div>
    </div>
  </div>
</div>

<script>
function clean(id){return(document.getElementById(id).value||'').trim()}
function numClean(id){return clean(id).replace(/,/g,'')}
function fmtGBP(n){return'£'+Number(n).toLocaleString('en-GB')}

async function generate(){
  const btn=document.getElementById('genBtn');
  const out=document.getElementById('output');
  const copyBtn=document.getElementById('copyBtn');

  const aua_now=numClean('aua_now');
  const aua_prev=numClean('aua_prev');
  const cust_new=clean('cust_new');
  const cust_churn=clean('cust_churn');
  const cust_total=clean('cust_total');
  const rev=numClean('rev');
  const burn=numClean('burn');
  const hires=clean('hires');
  const headcount=clean('headcount');
  const highlight=clean('highlight');
  const challenge=clean('challenge');
  const priority=clean('priority');

  if(!aua_now&&!cust_total&&!rev){
    out.innerHTML='<div class="empty-state"><i class="ti ti-alert-circle icon" aria-hidden="true"></i><p>Please fill in at least a few fields first.</p></div>';
    return;
  }

  btn.disabled=true;
  copyBtn.style.display='none';
  out.innerHTML='<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  let auaChange='';
  if(aua_now&&aua_prev&&Number(aua_prev)>0){
    const pct=((Number(aua_now)-Number(aua_prev))/Number(aua_prev)*100).toFixed(1);
    auaChange=` (${pct>0?'+':''}${pct}% MoM)`;
  }

  const prompt=`You are a startup communications specialist. Write a concise, confident investor update for a UK fintech/wealthtech startup. Use British English. Do not use bullet points or markdown formatting symbols like ** or ##. Use plain text only with each section on its own line starting with the section name in ALL CAPS followed by a colon and newline.

The sections must be exactly:
HEADLINE METRICS
COMMERCIAL HIGHLIGHTS
TEAM AND COSTS
FORWARD LOOK
WHERE WE NEED YOUR HELP

Here is the data for this month:
- AUA this month: ${aua_now?fmtGBP(aua_now):'not provided'}${auaChange}
- AUA last month: ${aua_prev?fmtGBP(aua_prev):'not provided'}
- New customers this month: ${cust_new||'not provided'}
- Churned customers: ${cust_churn||'not provided'}
- Total customers: ${cust_total||'not provided'}
- Revenue run rate: ${rev?fmtGBP(rev)+'/yr':'not provided'}
- Monthly burn rate: ${burn?fmtGBP(burn):'not provided'}
- New hires: ${hires||'not provided'}
- Total headcount: ${headcount||'not provided'}
- Key highlight: ${highlight||'not provided'}
- Biggest challenge: ${challenge||'not provided'}
- Priority next month: ${priority||'not provided'}

Write 2–4 sentences per section. Tone: transparent, direct, and confident — suitable for VCs and angels. For any metric marked "not provided", omit it from the update naturally. Do not invent numbers.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content.find(b=>b.type==='text')?.text||'No response received.';

    const sections=['HEADLINE METRICS','COMMERCIAL HIGHLIGHTS','TEAM AND COSTS','FORWARD LOOK','WHERE WE NEED YOUR HELP'];
    let html=text;
    sections.forEach(s=>{
      html=html.replace(new RegExp(s+':?\\s*\\n','g'),`|||SECTION:${s}|||`);
    });
    const parts=html.split('|||');
    let rendered='';
    let rawText='';
    parts.forEach(p=>{
      if(p.startsWith('SECTION:')){
        const title=p.replace('SECTION:','');
        rendered+=`<h3>${title.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}</h3>`;
        rawText+='\n'+title+'\n';
      } else if(p.trim()){
        rendered+=`<p>${p.trim().replace(/\n\n/g,'</p><p>').replace(/\n/g,' ')}</p>`;
        rawText+=p.trim()+'\n';
      }
    });
    out.innerHTML=rendered||`<p>${text}</p>`;
    out.dataset.raw=rawText.trim();
    copyBtn.style.display='flex';
  }catch(e){
    out.innerHTML='<div class="empty-state"><i class="ti ti-wifi-off icon" aria-hidden="true"></i><p>Something went wrong.<br>Please try again.</p></div>';
  }
  btn.disabled=false;
}

function copyText(){
  const raw=document.getElementById('output').dataset.raw||document.getElementById('output').innerText;
  navigator.clipboard.writeText(raw).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied';
    setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy';},2000);
  });
}
</script>
